<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenny | Portfolio</title>
    <link href="../../dist/output.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">

    <!-- Tailwind CSS CDN -->
    <!-- CDN sa gamiton kay need pa ug set up ang tailwind-->
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Navigation Bar -->
    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                
                <!-- Mobile: Logo on Left -->
                <div class="flex-shrink-0 flex items-center md:hidden">
                    <a href="#home" class="text-2xl font-bold text-brand-dark tracking-tighter">
                        Kenny<span class="text-brand">.</span>
                    </a>
                </div>

                <!-- Desktop: Centered Layout (Left Links - Logo - Right Links) -->
                <div class="hidden md:flex items-center justify-center w-full space-x-8">
                    <!-- Left Side Links -->
                    <div class="flex space-x-8">
                        <a href="#home" class="text-gray-600 hover:text-brand font-medium transition duration-300">Home</a>
                        <a href="#about" class="text-gray-600 hover:text-brand font-medium transition duration-300">About</a>
                    </div>

                    <!-- Center Logo -->
                    <div class="flex-shrink-0">
                        <a href="#home" class="text-2xl font-bold text-brand-dark tracking-tighter">
                            Kenny<span class="text-brand">.</span>
                        </a>
                    </div>

                    <!-- Right Side Links -->
                    <div class="flex space-x-8">
                        <a href="#projects" class="text-gray-600 hover:text-brand font-medium transition duration-300">Projects</a>
                        <a href="#blog" class="text-gray-600 hover:text-brand font-medium transition duration-300">Blog</a>
                    </div>
                </div>

                <!-- Mobile: Hamburger on Right -->
                <div class="flex-shrink-0 flex items-center md:hidden">
                    <button id="mobile-menu-btn" class="text-gray-600 hover:text-brand focus:outline-none p-2">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu: Slide from Right -->
    <div id="mobile-menu" class="fixed isadnset-y-0 right-0 w-64 bg-white shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out z-50 flex flex-col justify-center items-center space-y-8">
        <button id="close-menu-btn" class="absolute top-4 right-4 text-gray-500 hover:text-brand">
            <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        
        <a href="#home" class="text-2xl font-bold text-gray-800 hover:text-brand transition">Home</a>
        <a href="#about" class="text-2xl font-bold text-gray-800 hover:text-brand transition">About</a>
        <a href="#projects" class="text-2xl font-bold text-gray-800 hover:text-brand transition">Projects</a>
        <a href="#blog" class="text-2xl font-bold text-gray-800 hover:text-brand transition">Blog</a>
    </div>

    <!-- Home / Hero Section -->
    <section id="home" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-50 to-white pt-20">
        <div class="text-center px-4 max-w-4xl mx-auto">
            <span class="inline-block py-1 px-3 rounded-full bg-pink-100 text-brand-dark text-sm font-semibold mb-4">
                Available for work
            </span>
            <h1 class="text-5xl md:text-7xl font-bold text-gray-900 mb-6">
                Hi, I'm <span class="text-brand">Kenny</span>.
            </h1>
            <p class="text-xl md:text-2xl text-gray-600 mb-10 max-w-2xl mx-auto">
                A passionate developer crafting beautiful digital experiences with clean code and modern design.
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <a href="#projects" class="px-8 py-3 bg-brand text-white font-semibold rounded-full shadow-lg hover:bg-brand-dark hover:shadow-xl transition transform hover:-translate-y-1">
                    View My Work
                </a>
                <a href="#about" class="px-8 py-3 bg-white text-brand border-2 border-brand font-semibold rounded-full hover:bg-pink-50 transition">
                    About Me
                </a>
            </div>
        </div>
    </section>

    
    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <span class="text-2xl font-bold">Kenny<span class="text-brand">.</span></span>
                <p class="text-gray-400 text-sm mt-1">© 2024 Kenny. All rights reserved.</p>
            </div>
            <div class="flex space-x-6">
                <a href="#" class="text-gray-400 hover:text-brand transition">Twitter</a>
                <a href="#" class="text-gray-400 hover:text-brand transition">LinkedIn</a>
                <a href="#" class="text-gray-400 hover:text-brand transition">GitHub</a>
            </div>
        </div>
    </footer>

    <script>
const btn = document.getElementById('mobile-menu-btn');
const closeBtn = document.getElementById('close-menu-btn');
const menu = document.getElementById('mobile-menu');
const backdrop = document.getElementById('menu-backdrop');
const links = menu.querySelectorAll('a');

function openMenu() {
    menu.classList.remove('translate-x-full');
    backdrop.classList.remove('hidden');
    setTimeout(() => {
        backdrop.classList.remove('opacity-0');
        backdrop.classList.add('opacity-100');
    }, 10);
}

function closeMenu() {
    menu.classList.add('translate-x-full');
    backdrop.classList.remove('opacity-100');
    backdrop.classList.add('opacity-0');

    setTimeout(() => {
        backdrop.classList.add('hidden');
    }, 300);
}

btn.addEventListener('click', openMenu);
closeBtn.addEventListener('click', closeMenu);
backdrop.addEventListener('click', closeMenu);

links.forEach(link => {
    link.addEventListener('click', closeMenu);
});

document.addEventListener('keydown', (e) => {
    if (e.key === "Escape") closeMenu();
});
</script>
</body>
</html>
